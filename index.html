<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vertical Antenna Optimizer</title><style>:root{--navy-900:#020617;--navy-800:#02091a;--navy-700:#071426;--navy-600:#0b1b33;--navy-500:#12233f;--cyan-400:#5fe1ff;--cyan-300:#3fd0ff;--gold-400:#ffd75e;--gray-100:#e5e7eb;--gray-200:#9ca3af;--text-strong:#f9fafb;--text-soft:#9ca3af;--fs-xl:1.9rem;--fs-lg:1.4rem;--fs-md:1.05rem;--fs-sm:0.9rem;--pad-xl:28px;--pad-lg:20px;--pad-md:14px;--pad-sm:8px;--radius:14px;--shadow:0 10px 30px rgba(0,0,0,0.6);}*,*::before,*::after{box-sizing:border-box;}html{scroll-behavior:smooth;}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#0a1224 0%,#0f1b33 40%,#152544 100%);color:var(--text-strong);} .app-shell{max-width:1100px;margin:0 auto;padding:var(--pad-lg) var(--pad-md) var(--pad-xl);} .app-header{background:linear-gradient(90deg,#0f1b33,#152544);padding:var(--pad-lg) var(--pad-md);border-radius:var(--radius);box-shadow:0 6px 18px rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.05);margin-bottom:var(--pad-lg);} .app-title{margin:0 0 4px;font-size:var(--fs-xl);font-weight:700;color:var(--cyan-300);text-shadow:0 0 12px rgba(63,208,255,0.45);} .app-subtitle{margin:0;font-size:var(--fs-sm);color:var(--text-soft);} .app-badges{margin-top:var(--pad-sm);display:flex;flex-wrap:wrap;gap:8px;padding-top:var(--pad-sm);border-top:1px solid rgba(255,255,255,0.08);} .badge{font-size:var(--fs-sm);padding:4px 10px;border-radius:999px;background:rgba(15,23,42,0.9);color:var(--gray-100);border:1px solid rgba(148,163,184,0.5);} .badge.hot{background:rgba(250,204,21,0.1);border-color:var(--gold-400);color:var(--gold-400);box-shadow:0 0 10px rgba(255,204,77,0.45);} .app-body{display:flex;flex-direction:column;gap:var(--pad-lg);margin-top:var(--pad-md);} .panel{background:linear-gradient(180deg,#0f1b33 0%,#152544 100%);border-radius:var(--radius);padding:var(--pad-lg);box-shadow:0 6px 18px rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(4px);} .panel-header{display:flex;flex-direction:column;gap:4px;margin-bottom:var(--pad-md);} .panel-title{margin:0;font-size:var(--fs-lg);font-weight:700;color:var(--cyan-300);text-shadow:0 0 10px rgba(63,208,255,0.35);} .panel-tag{font-size:var(--fs-sm);color:var(--text-soft);} .field-grid{display:grid;grid-template-columns:1fr;gap:var(--pad-md);margin-bottom:var(--pad-md);} .field{display:flex;flex-direction:column;gap:4px;} .field-label{font-size:var(--fs-sm);color:var(--text-soft);} input,select{width:100%;padding:12px 14px;border-radius:10px;border:2px solid #1d325a;background:linear-gradient(180deg,#152544 0%,#1d325a 100%);color:var(--text-strong);font-size:var(--fs-md);font-weight:500;letter-spacing:0.3px;min-height:48px;} input:focus,select:focus{outline:none;border-color:var(--cyan-400);box-shadow:0 0 12px rgba(63,208,255,0.45);} button{cursor:pointer;border-radius:999px;border:none;min-height:48px;font-size:var(--fs-md);font-weight:600;padding:12px 20px;} .primary-btn{background:var(--cyan-300);color:#000;box-shadow:0 6px 18px rgba(63,208,255,0.45);} .primary-btn:hover{background:var(--cyan-400);} .summary-grid{display:grid;grid-template-columns:1fr;gap:var(--pad-md);} .summary-item{background:linear-gradient(180deg,#152544 0%,#1d325a 100%);border-radius:10px;padding:var(--pad-md);border-left:4px solid rgba(63,208,255,0.45);} .summary-label{font-size:var(--fs-sm);color:var(--text-soft);margin-bottom:4px;} .summary-value{font-size:var(--fs-lg);font-weight:700;color:var(--cyan-300);} .cut-grid{display:grid;grid-template-columns:1fr;gap:var(--pad-md);} .cut-item{background:linear-gradient(180deg,#152544 0%,#1d325a 100%);border-radius:10px;padding:var(--pad-md);border-left:4px solid rgba(255,204,77,0.55);} .cut-label{font-size:var(--fs-sm);color:var(--text-soft);} .cut-value{font-size:var(--fs-md);font-weight:700;color:var(--gold-400);} .plot-box{background:linear-gradient(180deg,#152544 0%,#1d325a 100%);border-radius:10px;padding:var(--pad-md);border:1px solid rgba(255,255,255,0.06);} canvas#plot_canvas{width:100%;height:260px;display:block;background:radial-gradient(circle at top,#1f2937 0%,#020617 70%);border-radius:10px;border:1px solid rgba(148,163,184,0.4);} @media(min-width:900px){.field-grid{grid-template-columns:repeat(2,minmax(0,1fr));}.summary-grid{grid-template-columns:repeat(4,minmax(0,1fr));}.cut-grid{grid-template-columns:repeat(3,minmax(0,1fr));}} @media(max-width:480px){:root{--fs-xl:1.8rem;--fs-lg:1.35rem;--fs-md:1.05rem;--fs-sm:0.92rem;} input,select,button{padding:16px 20px;min-height:52px;} .panel{padding:var(--pad-lg);}}</style></head><body><div class="app-shell"><header class="app-header"><h1 class="app-title">Vertical Antenna Optimizer</h1><p class="app-subtitle">HF Lab • KG5IEF</p><div class="app-badges"><span class="badge hot">Live Calculator</span></div></header><main class="app-body"><section class="panel"><div class="panel-header"><h2 class="panel-title">Operating Parameters</h2><span class="panel-tag">Band, power, gain, loss</span></div><div class="field-grid"><label class="field"><span class="field-label">Band</span><select id="band_select"><option value="3.5">80 m</option><option value="7">40 m</option><option value="14">20 m</option><option value="21">15 m</option><option value="28">10 m</option><option value="50">6 m</option></select></label><label class="field"><span class="field-label">TX Power (W)</span><input id="tx_power_w" type="number" value="100"></label><label class="field"><span class="field-label">Gain (dBi)</span><input id="gain_dbi" type="number" value="2.1"></label><label class="field"><span class="field-label">Coax Loss (dB)</span><input id="coax_loss_db" type="number" value="0.8"></label></div><button id="calc_btn" class="primary-btn">Recalculate</button></section><section class="panel"><div class="panel-header"><h2 class="panel-title">Summary</h2><span class="panel-tag">ERP and band info</span></div><div class="summary-grid"><div class="summary-item"><div class="summary-label">Band</div><div id="summary_band" class="summary-value">80 m</div></div><div class="summary-item"><div class="summary-label">ERP (W)</div><div id="summary_erp_w" class="summary-value">0</div></div><div class="summary-item"><div class="summary-label">ERP (dBW)</div><div id="summary_erp_dbw" class="summary-value">0</div></div><div class="summary-item"><div class="summary-label">ERP (dBm)</div><div id="summary_erp_dbm" class="summary-value">0</div></div></div></section><section class="panel"><div class="panel-header"><h2 class="panel-title">Cut Lengths</h2><span class="panel-tag">Quarter‑wave approximations</span></div><div class="cut-grid"><div class="cut-item"><div class="cut-label">80 m</div><div id="cut_80m_m" class="cut-value">0.0 m</div></div><div class="cut-item"><div class="cut-label">40 m</div><div id="cut_40m_m" class="cut-value">0.0 m</div></div><div class="cut-item"><div class="cut-label">20 m</div><div id="cut_20m_m" class="cut-value">0.0 m</div></div><div class="cut-item"><div class="cut-label">15 m</div><div id="cut_15m_m" class="cut-value">0.0 m</div></div><div class="cut-item"><div class="cut-label">10 m</div><div id="cut_10m_m" class="cut-value">0.0 m</div></div><div class="cut-item"><div class="cut-label">6 m</div><div id="cut_6m_m" class="cut-value">0.0 m</div></div></div></section></main></div><script>document.addEventListener("DOMContentLoaded",()=>{const b=document.getElementById("band_select"),p=document.getElementById("tx_power_w"),g=document.getElementById("gain_dbi"),l=document.getElementById("coax_loss_db"),btn=document.getElementById("calc_btn"),sb=document.getElementById("summary_band"),ew=document.getElementById("summary_erp_w"),edbw=document.getElementById("summary_erp_dbw"),edbm=document.getElementById("summary_erp_dbm"),cuts={"80":document.getElementById("cut_80m_m"),"40":document.getElementById("cut_40m_m"),"20":document.getElementById("cut_20m_m"),"15":document.getElementById("cut_15m_m"),"10":document.getElementById("cut_10m_m"),"6":document.getElementById("cut_6m_m")};function q(m){return 234/m*0.3048;}function updCuts(){const map={80:3.5,40:7,20:14,15:21,10:28,6:50};for(const k in map){cuts[k].textContent=q(map[k]).toFixed(2)+" m";}}function bandLbl(m){if(m<5)return"80 m";if(m<10)return"40 m";if(m<18)return"20 m";if(m<25)return"15 m";if(m<40)return"10 m";return"6 m";}function calc(){const mhz=parseFloat(b.value),pw=parseFloat(p.value),gd=parseFloat(g.value),ld=parseFloat(l.value),net=gd-ld,erp=pw*Math.pow(10,net/10),dbw=10*Math.log10(Math.max(erp,1e-9)),dbm=dbw+30;sb.textContent=bandLbl(mhz);ew.textContent=erp.toFixed(1);edbw.textContent=dbw.toFixed(1);edbm.textContent=dbm.toFixed(1);}btn.addEventListener("click",calc);updCuts();calc();});</script></body></html>
